name: Deploy ELI5 Paper Lab to GitHub Pages

on:
  push:
    branches: [ main ]          # runs every time you push to main
  workflow_dispatch:            # also lets you trigger it manually from GitHub UI

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Inject API key into index.html
        # Replaces the %%ANTHROPIC_API_KEY%% placeholder with the real secret.
        # The secret is stored in GitHub → Settings → Secrets, never in code.
        run: |
          sed -i "s|%%ANTHROPIC_API_KEY%%|${{ secrets.ANTHROPIC_API_KEY }}|g" index.html

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'           # uploads entire repo root as the site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
